version: '3.8'

services:
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:8000"
    environment:
      - OLLAMA_URL=${OLLAMA_URL}

  frontend:
    build: ./frontend
    ports:
      - "3000:443"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    depends_on:
      - backend
    networks:
      - chatbot_network

networks:
  chatbot_network:
    driver: bridge

volumes:
  ollama_data:
